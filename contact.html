<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drishya - Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Drishya.</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="hobbies.html">Hobbies</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 style="text-align: center;">Get In Touch</h2>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <p style="text-align: center; margin-bottom: 2rem;">Got a question or just want to say hi? Send me a message below, and I'll make sure to get back to you soon!</p>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message <i
                        class="fas fa-paper-plane"></i></button>
            </form>

            <div class="contact-info">
                <h3 style="margin-bottom: 1rem;">Contact Details</h3>
                <p><i class="fas fa-envelope" style="color: var(--primary-color); margin-right: 10px;"></i>
                    shredrishya@gmail.com</p>
                <p><i class="fas fa-phone" style="color: var(--primary-color); margin-right: 10px;"></i> +977 9811945942
                </p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Drishya Man Shrestha. All Rights Reserved.</p>
    </footer>
</body>

</html>
